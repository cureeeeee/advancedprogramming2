syntax = "proto3";

package order.v1;

option go_package = "github.com/cureeeeee/ap2-contracts-generated/gen/go/order/v1;orderv1";

import "google/protobuf/timestamp.proto";

service OrderTrackingService {
  rpc SubscribeToOrderUpdates(SubscribeToOrderUpdatesRequest) returns (stream SubscribeToOrderUpdatesResponse);
}

message SubscribeToOrderUpdatesRequest {
  string order_id = 1;
}

message SubscribeToOrderUpdatesResponse {
  string order_id = 1;
  string status = 2;
  google.protobuf.Timestamp updated_at = 3;
}
